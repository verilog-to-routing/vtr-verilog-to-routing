        ./run_reg_test.py vtr_reg_basic -show_failures -j${{ steps.cpu-cores.outputs.count}}


  Regression:
    runs-on: ubuntu-24.04
    needs: [BuildVTR]
    strategy:
      fail-fast: false
      matrix:
        include: [
          {
            name: 'Basic',
            suite: 'vtr_reg_basic',
            extra_pkgs: ''
          },
          {
            name: 'Strong',
            suite: 'vtr_reg_strong',
            extra_pkgs: ''
          },
          {
            name: 'SystemVerilog',
            suite: 'vtr_reg_system_verilog',
            extra_pkgs: ''
          },
          {
            name: 'Valgrind Memory',
            suite: 'vtr_reg_valgrind_small',
            extra_pkgs: 'valgrind'
          }
        ]
    name: 'R: ${{ matrix.name }}'
    steps:

    - uses: actions/setup-python@v6
      with:
        python-version: 3.12.3

    - uses: actions/checkout@v6

    - name: Fetch submodules
      env:
        EZGL_DEPLOY_KEY: ${{ secrets.EZGL_DEPLOY_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$EZGL_DEPLOY_KEY" > ~/.ssh/ezgl_deploy_key
        chmod 600 ~/.ssh/ezgl_deploy_key
        ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
        git config submodule.libs/EXTERNAL/libezgl.url "git@github.com:QL-Proprietary/ezgl-QL.git"
        GIT_SSH_COMMAND="ssh -i ~/.ssh/ezgl_deploy_key -o StrictHostKeyChecking=no" git submodule update --init --recursive
        rm -f ~/.ssh/ezgl_deploy_key

    - name: Get number of CPU cores
      uses: SimenB/github-actions-cpu-cores@v2
      id: cpu-cores

    - name: Install dependencies
      run: ./install_apt_packages.sh

    - name: Install Extra Dependencies
      if: ${{ matrix.extra_pkgs != '' }}
      run: |
        sudo apt update
        sudo apt install -y ${{ matrix.extra_pkgs }}

    - name: Install Python Requirements
      run: |
        pip install -r requirements.txt

    - name: Download Build Artifact
      uses: actions/download-artifact@v8
      with:
        name: build-release.tar.gz

    - name: Unpack Build
      shell: bash
      run: |
        tar -xvzf build.tar.gz

    - name: Test
      timeout-minutes: 30
      run: |
        ./run_reg_test.py ${{ matrix.suite }} -show_failures -j${{ steps.cpu-cores.outputs.count}}

    - name: Upload regression run files
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{matrix.name}}_run_files
        path: |
          vtr_flow/**/*.out
          # vtr_flow/**/*.blif  # Removed since it was taking too much space and was hardly used.
          vtr_flow/**/*.p
          vtr_flow/**/*.net
          vtr_flow/**/*.r

    - name: Upload regression results
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{matrix.name}}_results
        path: |
          vtr_flow/**/*.log
          vtr_flow/**/parse_results*.txt


