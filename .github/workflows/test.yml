  Sanitized:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: [
          {
            name: 'Basic',
            params: '-DVTR_ASSERT_LEVEL=3 -DVTR_ENABLE_SANITIZE=on -DVTR_IPO_BUILD=off -DWITH_BLIFEXPLORER=on -DWITH_PARMYS=OFF -DWITH_ODIN=on -DVPR_USE_EZGL=off',
            suite: 'vtr_reg_basic_odin'
          }
          #- { name: 'Strong', suite: 'vtr_reg_strong' } # SKIP Too long to run on GitHub Actions (max 6h)
        ]


    name: 'S: ${{ matrix.name }}'
    steps:

    - uses: actions/setup-python@v6
      with:
        python-version: 3.12.3
    - uses: actions/checkout@v6

    - name: Fetch submodules
      env:
        EZGL_DEPLOY_KEY: ${{ secrets.EZGL_DEPLOY_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$EZGL_DEPLOY_KEY" > ~/.ssh/ezgl_deploy_key
        chmod 600 ~/.ssh/ezgl_deploy_key
        ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
        git config submodule.libs/EXTERNAL/libezgl.url "git@github.com:QL-Proprietary/ezgl-QL.git"
        GIT_SSH_COMMAND="ssh -i ~/.ssh/ezgl_deploy_key -o StrictHostKeyChecking=no" git submodule update --init --recursive
        rm -f ~/.ssh/ezgl_deploy_key

    - name: Get number of CPU cores
      uses: SimenB/github-actions-cpu-cores@v2
      id: cpu-cores

    - name: Install dependencies
      run: ./install_apt_packages.sh

    - name: Install Python Requirements
      run: |
        pip install -r requirements.txt

    - uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ github.job }}-${{ matrix.suite }}

    - name: Test
      timeout-minutes: 60
      env:
        CMAKE_PARAMS: ${{ matrix.params }}
        BUILD_TYPE: RelWithDebInfo
        LSAN_OPTIONS: 'exitcode=42' #Use a non-standard exit code to ensure LSAN errors are detected
        # In Ubuntu 20240310.1.0, the entropy of ASLR has increased (28 -> 32). LLVM 14 in this
        # image is not compatible with this increased ASLR entropy. Apparently, memory sanitizer
        # depends on LLVM and all CI tests where VTR_ENABLE_SANITIZE is enabled fail. For a temporary
        # fix, we manually reduce the entropy. This quick fix should be removed in the future
        # when github deploys a more stable Ubuntu image.
        NUM_PROC: ${{ steps.cpu-cores.outputs.count }}
      run: |
        sudo sysctl -w vm.mmap_rnd_bits=28
        export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
        ./.github/scripts/build.sh
        # We skip QoR since we are only checking for errors in sanitizer runs
        ./run_reg_test.py ${{ matrix.suite }} -show_failures -j${{ steps.cpu-cores.outputs.count }} -skip_qor


