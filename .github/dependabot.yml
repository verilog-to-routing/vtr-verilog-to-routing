version: 2

updates:

  # Monthly update of submodules.
  # This dependabot will create a PR if there are any updates to the submodules.
  - package-ecosystem: gitsubmodule
    schedule:
        interval: "monthly"

    # Update all submodules
    directory: /

  # This will create a PR if there are any updates to the actions used in the CI.
  - package-ecosystem: "github-actions"
    # Workflow files stored in the default location of `.github/workflows`
    directory: "/"
    # Check for updates once a week
    schedule:
      interval: "weekly"

  # Pip dependency updates. Directories are listed explicitly to prevent
  # vtr_flow/parse/pass_requirements/ (a VTR-internal config folder whose
  # files happen to match the requirements*.txt pattern) from being
  # misidentified as pip manifests.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: pip
    directory: "/dev"
    schedule:
      interval: "weekly"
  - package-ecosystem: pip
    directory: "/doc"
    schedule:
      interval: "weekly"
  - package-ecosystem: pip
    directory: "/parmys"
    schedule:
      interval: "weekly"
